<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyFetch - Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🌤️ SkyFetch</h1>
        <p class="tagline">Your Personal Weather Dashboard</p>

        <!-- Search Section -->
        <div class="search-section">
            <input type="text" id="city-input" placeholder="Enter city name..." />
            <button id="search-btn">🔍 Search</button>
        </div>

        <!-- Recent Searches Section -->
        <div id="recent-searches-section" class="recent-searches-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h3>Recent Searches</h3>
                <button id="clear-history-btn" class="clear-history-btn">Clear</button>
            </div>
            <div id="recent-searches-container"></div>
        </div>

        <!-- Weather Display Section -->
        <div id="weather-display">
            <div class="loading-container">
                <div class="spinner"></div>
                <p>Loading weather data...</p>
            </div>
        </div>
    </div>

    <!-- Axios CDN -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <!-- Weather App JavaScript -->
     <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
